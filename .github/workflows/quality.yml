name: Quality

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Spell check
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: .cspell.json
          files: |
            **/*.md
            **/*.java
            **/*.yml
            **/*.yaml
            **/*.properties

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2
