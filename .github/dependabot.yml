version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: gradle-wrapper
        versions:
          - "9.x"
      - dependency-name: com.diffplug.spotless
        versions:
          - "8.x"
