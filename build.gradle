buildscript {
	if (!System.getenv('runelite.pluginhub.package.buildDir')) {
		repositories {
			gradlePluginPortal()
			mavenCentral()
		}
		dependencies {
			classpath 'com.diffplug.spotless:spotless-plugin-gradle:6.25.0'
			classpath 'com.github.spotbugs.snom:spotbugs-gradle-plugin:6.5.0'
		}
	}
}

plugins {
	id 'java'
	id 'jacoco'
	id 'checkstyle'
	id 'pmd'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'
def pluginMainClass = 'com.truetilerenderer.TrueTileRendererPluginTest'
def isPluginHubPackage = System.getenv('runelite.pluginhub.package.buildDir') != null
def isMacOs = System.getProperty('os.name', '').toLowerCase().contains('mac')
def runeLiteJvmArgs = ['-ea']

if (!isPluginHubPackage) {
	apply plugin: 'com.diffplug.spotless'
	apply plugin: 'com.github.spotbugs'
}

if (isMacOs) {
	runeLiteJvmArgs += ['--add-exports=java.desktop/com.apple.eawt=ALL-UNNAMED']
}

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	testImplementation 'junit:junit:4.13.2'
	testImplementation 'org.mockito:mockito-core:5.23.0'
	testCompileOnly 'com.github.spotbugs:spotbugs-annotations:4.8.6'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(11)
	options.compilerArgs += ['-Xlint:deprecation', '-Xlint:unchecked', '-Werror']
}

checkstyle {
	toolVersion = '10.17.0'
	configFile = file('config/checkstyle/checkstyle.xml')
}

pmd {
	toolVersion = '6.55.0'
	consoleOutput = true
	ruleSets = []
	ruleSetFiles = files('config/pmd/ruleset.xml')
}

jacoco {
	toolVersion = '0.8.13'
}

if (!isPluginHubPackage) {
	spotless {
		java {
			target 'src/**/*.java'
			googleJavaFormat('1.22.0')
			formatAnnotations()
			removeUnusedImports()
			trimTrailingWhitespace()
			endWithNewline()
		}
		format 'misc', {
			target '.gitignore', '*.gradle', '*.md', 'config/**/*.xml'
			trimTrailingWhitespace()
			indentWithTabs()
			endWithNewline()
		}
	}

	spotbugs {
		toolVersion.set('4.8.6')
	}
}

tasks.withType(Checkstyle).configureEach {
	reports {
		xml.required.set(false)
		html.required.set(true)
	}
}

tasks.withType(Pmd).configureEach {
	reports {
		xml.required.set(false)
		html.required.set(true)
	}
}

if (!isPluginHubPackage) {
	tasks.matching { it.name == 'spotbugsMain' || it.name == 'spotbugsTest' }.configureEach {
		reports {
			xml.required.set(false)
			html.required.set(true)
		}
	}
}

tasks.named('check') {
	dependsOn 'jacocoTestCoverageVerification'

	if (!isPluginHubPackage) {
		dependsOn 'spotlessCheck'
	}
}

tasks.named('test') {
	finalizedBy 'jacocoTestReport'
}

tasks.named('jacocoTestReport') {
	dependsOn 'test'
	reports {
		xml.required.set(true)
		html.required.set(true)
	}
}

tasks.named('jacocoTestCoverageVerification') {
	dependsOn 'jacocoTestReport'
	violationRules {
		rule {
			element = 'CLASS'
			limit {
				counter = 'LINE'
				value = 'MISSEDCOUNT'
				maximum = 0
			}
		}
	}
}

tasks.register('run', JavaExec) {
	classpath = sourceSets.test.runtimeClasspath
	mainClass = pluginMainClass

	jvmArgs runeLiteJvmArgs
	args "--developer-mode", "--debug"
}

tasks.register('shadowJar', Jar) {
	dependsOn configurations.testRuntimeClasspath
	manifest {
		attributes('Main-Class': pluginMainClass, 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from sourceSets.test.output
	from {
		configurations.testRuntimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}
